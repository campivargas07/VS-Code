services:
  n8n:
    image: n8nio/n8n:latest
    container_name: sku-slides-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-change_me}
    volumes:
      - ./n8n/data:/home/node/.n8n
      - ./n8n/workflows:/workflows

  playwright-capture:
    build:
      context: ./playwright-capture
      dockerfile: Dockerfile
    container_name: sku-playwright-capture
    restart: unless-stopped
    environment:
      - WEBHOOK_URL=${WEBHOOK_URL:-http://n8n:5678/webhook/sku-created}
    depends_on:
      - n8n
    profiles:
      - capture
